<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store - Portfolio</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; }
        header { background: #1e1e1e; padding: 20px; text-align: center; border-bottom: 2px solid #00ff88; }
        h1 { margin: 0; color: #00ff88; }
        
        .tab-container { display: flex; justify-content: center; margin-top: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #2a2a2a; border: none; color: white; margin: 0 5px; border-radius: 5px; transition: 0.3s; }
        .tab.active, .tab:hover { background: #00ff88; color: #121212; font-weight: bold; }

        .content { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .content.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #1e1e1e; color: white; margin-bottom: 10px; }
        input:focus { outline: none; border-color: #00ff88; }
        button.btn-submit { width: 100%; padding: 12px; background: #00ff88; color: #121212; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button.btn-submit:hover { background: #00cc6a; }

        .app-card { background: #1e1e1e; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid #00ff88; display: flex; justify-content: space-between; align-items: center; }
        .app-name { font-size: 18px; font-weight: bold; }
        .btn-download { background: #00ff88; color: #121212; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .btn-download:hover { background: #00cc6a; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 8px 10px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>My App Store</h1>
        <p>Koleksi Aplikasi Buatanku</p>
    </header>

    <div class="tab-container">
        <button class="tab active" onclick="switchTab('public')">Daftar Aplikasi</button>
        <button class="tab" onclick="switchTab('admin')">Admin Panel</button>
    </div>

    <div id="public" class="content active">
        <div id="appList"></div>
    </div>

    <div id="admin" class="content">
        <div class="form-group">
            <label>Nama Aplikasi</label>
            <input type="text" id="appName" placeholder="Masukkan nama aplikasi..." required>
        </div>
        <div class="form-group">
            <label>Link MediaFire</label>
            <input type="url" id="appLink" placeholder="https://www.mediafire.com/..." required>
        </div>
        <button class="btn-submit" onclick="addApp()">Post Aplikasi</button>
    </div>

    <script>
        // Pindah Tab dengan Verifikasi Password
        function switchTab(tabId) {
            if (tabId === 'admin') {
                let password = prompt("Masukkan Password Admin:");
                // Password default diatur ke 'imba'. Silakan ganti jika mau.
                if (password !== "imba") {
                    alert("Akses Ditolak! Password Salah.");
                    return; 
                }
            }

            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'public') {
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        let apps = JSON.parse(localStorage.getItem('myApps')) || [];

        function renderApps() {
            const appList = document.getElementById('appList');
            appList.innerHTML = '';
            
            if(apps.length === 0) {
                appList.innerHTML = '<p style="text-align:center; color:#ccc;">Belum ada aplikasi yang di-post.</p>';
                return;
            }

            apps.forEach((app, index) => {
                appList.innerHTML += `
                    <div class="app-card">
                        <div class="app-name">${app.name}</div>
                        <div>
                            <a href="${app.link}" target="_blank" class="btn-download">Download</a>
                            <button class="btn-delete" style="display:none;" id="delBtn-${index}" onclick="deleteApp(${index})">X</button>
                        </div>
                    </div>
                `;
            });

            // Tampilkan tombol hapus HANYA jika sedang di dalam mode Admin
            if (document.getElementById('admin').classList.contains('active')) {
                apps.forEach((_, index) => {
                    document.getElementById(`delBtn-${index}`).style.display = "inline-block";
                });
            }
        }

        function addApp() {
            const name = document.getElementById('appName').value;
            const link = document.getElementById('appLink').value;

            if(name === '' || link === '') {
                alert('Nama dan Link wajib diisi!');
                return;
            }

            apps.push({ name: name, link: link });
            localStorage.setItem('myApps', JSON.stringify(apps)); 
            
            document.getElementById('appName').value = '';
            document.getElementById('appLink').value = '';
            
            alert('Aplikasi berhasil ditambahkan!');
            renderApps();
        }

        function deleteApp(index) {
            if(confirm('Hapus aplikasi ini?')) {
                apps.splice(index, 1);
                localStorage.setItem('myApps', JSON.stringify(apps));
                renderApps();
            }
        }

        // Jalankan render setiap tombol tab diklik untuk me-refresh tombol hapus
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', renderApps);
        });

        renderApps();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Store Premium</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --hover: #2563eb;
        }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); color: var(--text);
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid #334155;
        }
        header h1 { margin: 0; font-size: 22px; font-weight: 700; color: #fff; }
        .btn {
            background: var(--accent); color: #fff; border: none; padding: 10px 18px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: var(--hover); }
        main { padding: 30px 5%; max-width: 1200px; margin: auto; }
        
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px;
        }
        .card {
            background: var(--card); padding: 15px; border-radius: 12px;
            text-align: center; border: 1px solid #334155;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover; 
            border-radius: 10px; margin-bottom: 10px;
        }
        .card h3 { margin: 5px 0 15px 0; font-size: 15px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .card a {
            display: block; background: var(--accent); color: #fff;
            text-decoration: none; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: bold;
        }
        .card a:hover { background: var(--hover); }

        /* Modal Ruang Admin */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; z-index: 200;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card); padding: 25px; border-radius: 12px; 
            width: 90%; max-width: 350px; border: 1px solid #334155;
        }
        .modal-content h2 { margin-top: 0; text-align: center; color: var(--accent); }
        .modal-content input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #475569; background: var(--bg); color: var(--text); box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <h1>Aplikasi</h1>
        <button class="btn" onclick="cekPassword()">Ruang Admin</button>
    </header>

    <main>
        <div class="grid" id="gridAplikasi">
            <!-- Data akan muncul di sini -->
        </div>
    </main>

    <div class="modal" id="modalAdmin">
        <div class="modal-content">
            <h2>Post Aplikasi</h2>
            <input type="text" id="namaApp" placeholder="Nama Aplikasi">
            <input type="url" id="logoApp" placeholder="Link URL Gambar (Rasio 1:1)">
            <input type="url" id="linkApp" placeholder="Link MediaFire">
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="simpanApp()">Post</button>
            <button class="btn" style="width: 100%; background: #ef4444;" onclick="tutupAdmin()">Tutup</button>
        </div>
    </div>

    <script>
        let dataAplikasi = JSON.parse(localStorage.getItem('dataAplikasi')) || [];

        function tampilkanApp() {
            const grid = document.getElementById('gridAplikasi');
            grid.innerHTML = '';
            dataAplikasi.forEach(app => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${app.logo}" alt="${app.nama}" onerror="this.src='https://via.placeholder.com/150'">
                        <h3>${app.nama}</h3>
                        <a href="${app.link}" target="_blank">Download</a>
                    </div>
                `;
            });
        }

        function cekPassword() {
            const pw = prompt("Masukkan Password:");
            if (pw === "sendiri222") {
                document.getElementById('modalAdmin').style.display = 'flex';
            } else if (pw !== null) {
                alert("Password Salah!");
            }
        }

        function tutupAdmin() {
            document.getElementById('modalAdmin').style.display = 'none';
        }

        function simpanApp() {
            const nama = document.getElementById('namaApp').value;
            const logo = document.getElementById('logoApp').value;
            const link = document.getElementById('linkApp').value;

            if (!nama || !logo || !link) {
                alert("Harap isi semua kolom!");
                return;
            }

            dataAplikasi.push({ nama, logo, link });
            localStorage.setItem('dataAplikasi', JSON.stringify(dataAplikasi));
            tampilkanApp();
            
            document.getElementById('namaApp').value = '';
            document.getElementById('logoApp').value = '';
            document.getElementById('linkApp').value = '';
            alert("Berhasil diposting!");
        }

        tampilkanApp();
    </script>
</body>
</html>
